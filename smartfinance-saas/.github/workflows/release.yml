name: Release

on:
  workflow_dispatch:
    inputs:
      target:
        description: Target environment
        required: true
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.target }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Check workspace
        run: pnpm check

      - name: Apply D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        shell: bash
        run: |
          if [ "${{ inputs.target }}" = "production" ]; then
            DATABASE_NAME="smartfinance-saas-prod"
          else
            DATABASE_NAME="smartfinance-saas-staging"
          fi
          npx wrangler d1 migrations apply "$DATABASE_NAME" \
            --env "${{ inputs.target }}" \
            --config apps/api/wrangler.toml \
            --remote

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: >
          npx wrangler deploy
          --env ${{ inputs.target }}
          --config apps/api/wrangler.toml
          --keep-vars

      - name: Build web
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
        run: pnpm --filter @smartfinance/web build

      - name: Deploy Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: >
          npx wrangler pages deploy apps/web/dist
          --project-name ${{ vars.PAGES_PROJECT_NAME }}

      - name: Smoke deploy
        env:
          SMARTFINANCE_API_URL: ${{ vars.SMARTFINANCE_API_URL }}
          SMARTFINANCE_WEB_URL: ${{ vars.SMARTFINANCE_WEB_URL }}
          SMARTFINANCE_BEARER_TOKEN: ${{ secrets.SMARTFINANCE_BEARER_TOKEN }}
          SMARTFINANCE_EXPECT_AUTH: "true"
          SMARTFINANCE_REQUIRE_BEARER_TOKEN: ${{ inputs.target == 'production' && 'true' || 'false' }}
        run: pnpm smoke:deploy

      - name: Smoke staging ui/api
        if: ${{ vars.E2E_STAGING_WEB_URL != '' && vars.E2E_STAGING_API_URL != '' }}
        env:
          E2E_STAGING_WEB_URL: ${{ vars.E2E_STAGING_WEB_URL }}
          E2E_STAGING_API_URL: ${{ vars.E2E_STAGING_API_URL }}
          E2E_STAGING_BEARER_TOKEN: ${{ secrets.E2E_STAGING_BEARER_TOKEN }}
        run: pnpm test:e2e:staging
