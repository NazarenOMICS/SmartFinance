name = "smartfinance-saas-api"
main = "src/index.ts"
compatibility_date = "2025-01-15"

[[d1_databases]]
binding = "DB"
database_name = "smartfinance-saas-prod"
database_id = "1cb06651-b842-4650-a903-3fdd761f8086"
migrations_dir = "migrations"

[vars]
APP_ENV = "local"
AUTH_MODE = "development"
UPLOAD_BINARY_STORAGE = "disabled"
CLERK_JWKS_URL = "https://internal-salmon-11.clerk.accounts.dev/.well-known/jwks.json"
CLERK_ISSUER_URL = "https://internal-salmon-11.clerk.accounts.dev"
CLERK_ALLOWED_AZP = "http://localhost:5173,http://127.0.0.1:5173"
APP_BASE_URL = "http://localhost:5173"
ALLOWED_ORIGINS = "http://localhost:5173,http://127.0.0.1:5173"
AI_PROVIDER = "auto"
AI_TEXT_MODEL = "@cf/meta/llama-3.1-8b-instruct"
ERROR_REPORTING_WEBHOOK_URL = ""
# STRIPE_SECRET_KEY = "sk_test_..."
# STRIPE_WEBHOOK_SECRET = "whsec_..."
# STRIPE_PRICE_PRO_MONTHLY = "price_..."
# STRIPE_PRICE_PRO_YEARLY = "price_..."

[env.staging.vars]
APP_ENV = "staging"
AUTH_MODE = "clerk"
UPLOAD_BINARY_STORAGE = "disabled"
CLERK_JWKS_URL = "https://internal-salmon-11.clerk.accounts.dev/.well-known/jwks.json"
CLERK_ISSUER_URL = "https://internal-salmon-11.clerk.accounts.dev"
CLERK_ALLOWED_AZP = "https://staging.smartfinance-saas-web.pages.dev"
APP_BASE_URL = "https://staging.smartfinance-saas-web.pages.dev"
ALLOWED_ORIGINS = "https://staging.smartfinance-saas-web.pages.dev"
AI_PROVIDER = "auto"
AI_TEXT_MODEL = "@cf/meta/llama-3.1-8b-instruct"
ERROR_REPORTING_WEBHOOK_URL = ""

[[env.staging.d1_databases]]
binding = "DB"
database_name = "smartfinance-saas-staging"
database_id = "4d770b5d-2543-4b09-a5e1-95b46ae228fb"
migrations_dir = "migrations"

# Uncomment once R2 is enabled in the Cloudflare account.
# Then set UPLOAD_BINARY_STORAGE = "r2".
# [[env.staging.r2_buckets]]
# binding = "UPLOADS_BUCKET"
# bucket_name = "smartfinance-saas-uploads-staging"

[env.production.vars]
APP_ENV = "production"
AUTH_MODE = "clerk"
UPLOAD_BINARY_STORAGE = "disabled"
CLERK_JWKS_URL = "https://internal-salmon-11.clerk.accounts.dev/.well-known/jwks.json"
CLERK_ISSUER_URL = "https://internal-salmon-11.clerk.accounts.dev"
CLERK_ALLOWED_AZP = "https://smartfinance-saas-web.pages.dev"
APP_BASE_URL = "https://smartfinance-saas-web.pages.dev"
ALLOWED_ORIGINS = "https://smartfinance-saas-web.pages.dev"
AI_PROVIDER = "auto"
AI_TEXT_MODEL = "@cf/meta/llama-3.1-8b-instruct"
ERROR_REPORTING_WEBHOOK_URL = ""

[[env.production.d1_databases]]
binding = "DB"
database_name = "smartfinance-saas-prod"
database_id = "1cb06651-b842-4650-a903-3fdd761f8086"
migrations_dir = "migrations"

# Uncomment once R2 is enabled in the Cloudflare account.
# Then set UPLOAD_BINARY_STORAGE = "r2".
# [[env.production.r2_buckets]]
# binding = "UPLOADS_BUCKET"
# bucket_name = "smartfinance-saas-uploads"

